<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Email Verified</title>
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: Arial, sans-serif;
        }

        body {
          min-height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          background: linear-gradient(135deg, #f5f7fa, #e4ecf7);
          padding: 20px;
        }

        .card {
          width: 100%;
          max-width: 420px;
          background: #fff;
          border-radius: 20px;
          padding: 40px 30px;
          text-align: center;
          box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .icon {
          width: 80px;
          height: 80px;
          margin: 0 auto 20px;
          border-radius: 50%;
          background: #eafaf1;
          display: flex;
          justify-content: center;
          align-items: center;
          font-size: 40px;
        }

        h1 {
          font-size: 28px;
          margin-bottom: 12px;
          color: #222;
        }

        p {
          font-size: 16px;
          color: #666;
          line-height: 1.6;
          margin-bottom: 30px;
        }

        .btn {
          display: inline-block;
          text-decoration: none;
          background: #222;
          color: white;
          padding: 14px 28px;
          border-radius: 12px;
          font-size: 15px;
          transition: 0.3s ease;
        }

        .btn:hover {
          opacity: 0.9;
          transform: translateY(-1px);
        }

        .small-text {
          margin-top: 20px;
          font-size: 13px;
          color: #999;
        }

        @media (max-width: 480px) {
          .card {
            padding: 30px 20px;
          }

          h1 {
            font-size: 24px;
          }

          p {
            font-size: 15px;
          }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">✅</div>
    <h1>Email Verified</h1>
    <p>
        Your email has been successfully confirmed.
        You may now return to the application and sign in to continue.
    </p>
    <div class="small-text">
        You can now safely close this page.
    </div>
</div>

</body>
</html>
